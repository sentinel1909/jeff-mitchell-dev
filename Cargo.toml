[package]
name = "jeff-mitchell-dev"
version = "0.2.0"
edition = "2021"
description = "My dev profile site"
readme = "README.md"
authors = ["Jeffery D. Mitchell", "<sentinel1909@jeff-mitchell.dev"]
repository = "https://github.com/sentinel1909/jeff-mitchell-dev"
license = 'MIT'

[[bin]]
name = "jeff-mitchell-dev"
path = "src/bin/main.rs"

[lib]
name = "jeff_mitchell_dev"
path = "src/lib/lib.rs"

[dependencies]
askama = { version = "0.12.1", default-features = false, features = [ "with-axum" ] }
askama_axum = "0.4.0"
axum = "0.7.4"
gray_matter = "0.2.6"
pulldown-cmark = { version = "0.9.6", default-features = false }
regex = "1.10.3"
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
shuttle-axum = "0.41.0"
shuttle-runtime = { version = "0.41.0", default-features = false }
thiserror = "1.0.58"
tokio = "1.36.0"
tower-http = { version = "0.5.0", features = ["fs"] }
