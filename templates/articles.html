{% extends "base.html" %}

{% block content %}
<section class="article-grid">
  {% for article in articles %}
    <article class="article-card">
      <h3>{{ article.title }}</h3>
      <h4>{{ article.date }}</h4>
      <p>Category: {{ article.category }}</p>
      <p>Tag: {{ article.tag }}</p>
      <p>Summary: {{ article.summary }}</p>
      <a href="/article/{{ article.date }}/{{ article.slug }}">Do you want to know more?</a>
    </article>
  {% endfor %}
</section>
{% endblock %}
